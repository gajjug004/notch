<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sticky Timer</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <main class="note" id="note">
      <!-- Drag strip: moves the window. Buttons inside still receive clicks. -->
      <div class="note__drag" data-tauri-drag-region>
        <span class="note__dot" aria-hidden="true"></span>
        <button class="note__del" id="delete" title="Delete note" type="button">
          ×
        </button>
      </div>

      <input
        class="note__title"
        id="title"
        type="text"
        placeholder="Title"
        spellcheck="false"
      />

      <section class="timer" id="timer">
        <div id="timer-display" class="timer-display tabular">25:00</div>

        <div class="mode-toggle">
          <button id="mode-countdown" class="mode-btn active" type="button">
            Countdown
          </button>
          <button id="mode-stopwatch" class="mode-btn" type="button">
            Stopwatch
          </button>
        </div>

        <label class="duration" id="duration">
          <input
            id="dur-input"
            type="text"
            inputmode="numeric"
            value="25:00"
            pattern="[0-9]{1,3}:[0-5][0-9]"
          />
        </label>

        <div class="timer-controls">
          <button id="btn-start" type="button">Start</button>
          <button id="btn-pause" type="button" disabled>Pause</button>
          <button id="btn-reset" type="button">Reset</button>
        </div>
      </section>

      <button class="sched-fired" id="sched-fired" type="button" hidden>
        ▶ Scheduled — Start timer
      </button>

      <section class="schedule" id="schedule">
        <label class="sched-row">
          <span>Schedule</span>
          <select id="sched-kind">
            <option value="none">Off</option>
            <option value="once">Once</option>
            <option value="recurring">Recurring</option>
          </select>
        </label>

        <input type="datetime-local" id="sched-at" hidden />

        <div id="sched-recurring" hidden>
          <input type="time" id="sched-time" />
          <div class="weekdays">
            <label><input type="checkbox" data-wd="0" />M</label>
            <label><input type="checkbox" data-wd="1" />T</label>
            <label><input type="checkbox" data-wd="2" />W</label>
            <label><input type="checkbox" data-wd="3" />T</label>
            <label><input type="checkbox" data-wd="4" />F</label>
            <label><input type="checkbox" data-wd="5" />S</label>
            <label><input type="checkbox" data-wd="6" />S</label>
          </div>
        </div>

        <label class="sched-row">
          <input type="checkbox" id="sched-autostart" />
          <span>Auto-start timer</span>
        </label>
        <button id="sched-save" type="button">Set schedule</button>
      </section>

      <div
        class="note__body"
        id="body"
        contenteditable="true"
        role="textbox"
        aria-multiline="true"
        data-placeholder="Write something…"
      ></div>
    </main>
  </body>
</html>
