<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sticky Timer</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <!-- ===================== LIST VIEW ===================== -->
    <main class="view" id="list-view">
      <div class="note__drag" data-tauri-drag-region>
        <span class="note__dot" aria-hidden="true"></span>
        <span class="strip-title" data-tauri-drag-region>Sticky Timer</span>
        <button class="note__hide" id="list-hide" title="Hide to tray" type="button">
          ×
        </button>
      </div>

      <div class="list-head">
        <button class="new-btn" id="new-task" type="button">+ New task</button>
      </div>

      <div class="task-list" id="task-list"></div>

      <p class="list-empty" id="list-empty" hidden>
        No tasks yet. Tap <strong>+ New task</strong> to create one.
      </p>
    </main>

    <!-- ===================== DETAIL VIEW ===================== -->
    <main class="view note" id="detail-view" hidden>
      <div class="note__drag" data-tauri-drag-region>
        <button class="back-btn" id="back" title="Back to list" type="button">
          ←
        </button>
        <span class="strip-fill" data-tauri-drag-region></span>
        <button class="note__del" id="delete" title="Delete task" type="button">
          🗑
        </button>
        <button class="note__hide" id="detail-hide" title="Hide to tray" type="button">
          ×
        </button>
      </div>

      <input
        class="note__title"
        id="title"
        type="text"
        placeholder="Title"
        spellcheck="false"
      />

      <section class="timer" id="timer">
        <div class="clock">
          <button
            id="timer-display"
            class="timer-display tabular"
            type="button"
          >
            25:00
          </button>
          <input
            id="dur-input"
            class="dur-input tabular"
            type="text"
            inputmode="numeric"
            value="25:00"
            pattern="[0-9]{1,3}:[0-5][0-9]"
            hidden
          />
        </div>

        <div class="mode-toggle">
          <button id="mode-countdown" class="mode-btn active" type="button">
            countdown
          </button>
          <span class="mode-sep" aria-hidden="true">·</span>
          <button id="mode-stopwatch" class="mode-btn" type="button">
            stopwatch
          </button>
        </div>

        <div class="timer-controls">
          <button id="btn-toggle" type="button">start</button>
          <button id="btn-reset" type="button">reset</button>
        </div>
      </section>

      <button class="sched-fired" id="sched-fired" type="button" hidden>
        ▶ Scheduled — Start timer
      </button>

      <div class="sched-bar" id="sched-bar">
        <button class="sched-trigger" id="sched-trigger" type="button">
          <span class="sched-summary" id="sched-summary">Schedule</span>
          <span class="sched-chev" id="sched-chev" aria-hidden="true">›</span>
        </button>

        <div class="sched-pop" id="sched-pop" hidden>
          <label class="sched-row">
            <span>Repeat</span>
            <select id="sched-kind">
              <option value="none">Off</option>
              <option value="once">Once</option>
              <option value="recurring">Recurring</option>
            </select>
          </label>

          <div id="sched-once" hidden>
            <div class="presets">
              <span id="sched-mins"></span>
              <button type="button" data-preset="tonight">tonight</button>
              <button type="button" data-preset="tomorrow">tomorrow</button>
              <button type="button" data-preset="custom">custom…</button>
            </div>
            <div id="sched-custom" hidden>
              <input type="date" id="sched-cdate" />
              <input type="time" id="sched-ctime" />
            </div>
          </div>

          <div id="sched-recurring" hidden>
            <input type="time" id="sched-time" />
            <div class="weekdays">
              <label><input type="checkbox" data-wd="0" />M</label>
              <label><input type="checkbox" data-wd="1" />T</label>
              <label><input type="checkbox" data-wd="2" />W</label>
              <label><input type="checkbox" data-wd="3" />T</label>
              <label><input type="checkbox" data-wd="4" />F</label>
              <label><input type="checkbox" data-wd="5" />S</label>
              <label><input type="checkbox" data-wd="6" />S</label>
            </div>
          </div>

          <label class="sched-row" id="sched-auto-row" hidden>
            <input type="checkbox" id="sched-autostart" />
            <span>Auto-start timer</span>
          </label>

          <div class="sched-actions" id="sched-actions" hidden>
            <button id="sched-save" type="button">Set schedule</button>
          </div>
          <span id="sched-status" class="sched-status" aria-live="polite"></span>
        </div>
      </div>

      <div
        class="note__body"
        id="body"
        contenteditable="true"
        role="textbox"
        aria-multiline="true"
        data-placeholder="Write something…"
      ></div>
    </main>
  </body>
</html>
